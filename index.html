<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f5f2" />
    <meta name="description" content="Mora — organize sua fila de filmes, séries, livros e jogos." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Mora</title>
    <script>
      try {
        if (
          localStorage.getItem('mora-theme') === 'dark' ||
          localStorage.getItem('ante-theme') === 'dark'
        ) {
          document.documentElement.setAttribute('data-theme', 'dark')
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#16161a')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
